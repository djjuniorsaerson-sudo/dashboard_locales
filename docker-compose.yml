version: '3.8'

services:
  central-db:
    image: postgres:15-alpine
    container_name: central-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: central_admin
      POSTGRES_PASSWORD: central_password_123
      POSTGRES_DB: central_db
    volumes:
      - central_data:/var/lib/postgresql/data

  core_api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: central-core-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://central_admin:central_password_123@central-db:5432/central_db
      - YUMMY_DB_URL=postgresql://yummy_app:YummyDb2026!@localhost:5432/yummy
    depends_on:
      - central-db

  core_web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: central-core-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - core_api

volumes:
  central_data:
