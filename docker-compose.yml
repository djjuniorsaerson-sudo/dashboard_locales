version: '3.8'

services:
  central-db:
    image: postgres:15-alpine
    container_name: central-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: central_admin
      POSTGRES_PASSWORD: central_password_123
      POSTGRES_DB: central_db
    volumes:
      - central_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    image: central-backend:v2
    container_name: central-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://central_admin:central_password_123@central-db:5432/central_db
      # URL de la base de datos de Yummy (El local/cliente). Para Tailscale, usa la IP de Tailscale. Para Cloudflare TCP o Ngrok, usa la URL proporcionada.
      - YUMMY_DB_URL=postgresql://yummy_app:YummyDb2026!@localhost:5432/yummy
    depends_on:
      - central-db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: central-frontend:v2
    container_name: central-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  central_data:
